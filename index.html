<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>小王子与狐狸 | Interactive Storybook MVP</title>

  <!-- 绘本字体：Nunito（儿童友好）+ Playfair Display（高级感标题） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 魔法加载画面 -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loading-text">魔法绘本加载中…</div>
  </div>

  <!-- 舞台主容器：所有场景元素由 JS 动态渲染 -->
  <div id="stage">
    <!-- 全屏 Canvas 粒子背景（最底层） -->
    <canvas id="bg-canvas"></canvas>
    <!-- 顶部字幕面板 -->
    <div id="subtitle-panel"></div>
    <!-- 底部操作提示 -->
    <div id="hint-bar"></div>
  </div>

  <!-- file:// 协议兼容：预加载场景数据（服务器环境下引擎优先用 fetch） -->
  <script src="js/book-data.js"></script>
  <!-- 引擎脚本 -->
  <script src="js/engine.js"></script>
</body>
</html>
